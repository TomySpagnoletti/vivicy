version: 1
updated: "2026-06-22"
name: "Pocket Ledger Architecture Map"
purpose: "One machine-readable visual index of the Pocket Ledger module architecture and dataflow, used to generate target and progress views for the development-method rehearsal."
generated_artifact_path: ".vivicy/architecture-map/architecture-data.json"
evidence_ref_grammar: "path[:line][#anchor]"
verification_gate_ref_grammar: "^.vivicy/development/(gates|reports)/.+"

source_baseline:
  id: "baseline-2026-06-pocket-ledger-architecture-map"
  baseline_id: "baseline-v1.0.0"
  baseline_version: "1.0.0"
  manifest_path: ".vivicy/baselines/baseline-v1.0.0.json"
  manifest_hash: "d546deaa4b893d1ddc9dfb9a3150c5a7159a98439df9569839f3bcd6cebd9b59"
  document_set_hash: "3acb63c617f40a55ea7624447f9609fba9a10599d3a659e3a70deaaf89e0670b"
  captured_at: "2026-06-22"
  repo_root: "."
  included_docs:
    - ".vivicy/canonical/**/*.md"
  excluded_globs:
    - "_tmp/**"
    - ".vivicy/baselines/**"
    - "docs/governance/**"
  source_ref_grammar: "path[:line][#anchor]"

kind_taxonomy:
  - actor
  - app
  - contract
  - data
  - service

kind_definitions:
  - "actor: external human that originates intent or receives outcomes"
  - "app: human-facing application surface"
  - "contract: explicit interface, policy, or schema contract"
  - "data: business record or domain state"
  - "service: module that owns behavior"

flow_classes:
  - "user expense entry to stored ledger record"
  - "ledger read to derived report and export"

high_risk_kinds:

rules:
  - "Edit architecture-map.yml only. Generated viewer data is a build artifact."
  - "Every node and edge must be justified by source_refs."
  - "This map indexes the canonical docs; it does not override them."
  - "The Ledger is the single source of truth for stored expenses."
  - "After documentation freeze, live development progress is recorded in .vivicy/development/progress-ledger.json, not by mutating architecture-map.yml."

views:
  target:
    title: "Target Architecture"
    subtitle: "Complete planned Pocket Ledger module graph."
  progress:
    title: "Development Progress"
    subtitle: "Same graph, colored by the external development progress overlay backed by evidence_refs."

status_legend:
  not_started: "Documented target, implementation not started."
  in_progress: "Implementation started but not fully verified."
  reviewing: "Under independent review and fix before verification."
  implemented: "Implemented locally but not fully verified."
  verified: "Implemented and passed required verification gates."
  blocked: "Blocked by missing access, evidence, or external condition."

lanes:
  - id: entry
    label: "User Entry"
  - id: core
    label: "Core Library"

nodes:
  - id: user
    label: "User"
    kind: "actor"
    lane: entry
    order: 10
    layout_x: -160
    layout_y: 0
    layout_cluster: "entry"
    layout_role: primary_flow
    scope: mvp
    status: not_started
    tech: "Human user"
    owns_data: ["expense intents", "report requests"]
    source_refs: [".vivicy/canonical/01-architecture.md:21"]

  - id: cli
    label: "CLI"
    kind: "app"
    lane: entry
    order: 20
    layout_x: 200
    layout_y: 0
    layout_cluster: "entry"
    layout_role: primary_flow
    scope: mvp
    status: not_started
    tech: "Node command-line entry point"
    owns_data: ["command parsing", "stdout output", "exit codes"]
    source_refs: [".vivicy/canonical/06-cli.md"]

  - id: ledger
    label: "Ledger"
    kind: "service"
    lane: core
    order: 30
    layout_x: 560
    layout_y: 0
    layout_cluster: "core"
    layout_role: shared_state
    scope: mvp
    status: not_started
    tech: "In-memory expense store"
    owns_data: ["expense records", "insertion order", "total"]
    source_refs: [".vivicy/canonical/02-ledger-model.md"]

  - id: categorizer
    label: "Categorizer"
    kind: "service"
    lane: core
    order: 40
    layout_x: 560
    layout_y: 200
    layout_cluster: "core"
    layout_role: support
    scope: mvp
    status: not_started
    tech: "Pure keyword-rule classifier"
    owns_data: ["category rules", "category assignment"]
    source_refs: [".vivicy/canonical/03-category-rules.md"]

  - id: reporter
    label: "Reporter"
    kind: "service"
    lane: core
    order: 50
    layout_x: 920
    layout_y: -120
    layout_cluster: "core"
    layout_role: support
    scope: mvp
    status: not_started
    tech: "Derived read-model computation"
    owns_data: ["monthly totals", "category breakdown", "budget evaluation"]
    source_refs: [".vivicy/canonical/04-reporting.md"]

  - id: exporter
    label: "Exporter"
    kind: "service"
    lane: core
    order: 60
    layout_x: 920
    layout_y: 120
    layout_cluster: "core"
    layout_role: support
    scope: mvp
    status: not_started
    tech: "Deterministic CSV serializer"
    owns_data: ["CSV header", "CSV rows", "quoting rules"]
    source_refs: [".vivicy/canonical/05-csv-export.md"]

edges:
  - from: user
    to: cli
    relation: "issues commands"
    protocol: "Process arguments"
    data: ["command", "amountCents", "date", "description", "month"]
    source_refs: [".vivicy/canonical/06-cli.md:20"]

  - from: cli
    to: ledger
    relation: "adds and reads expenses"
    protocol: "Module call"
    data: ["expense record", "expense reads", "total"]
    source_refs: [".vivicy/canonical/02-ledger-model.md:11", ".vivicy/canonical/01-architecture.md:25"]

  - from: cli
    to: categorizer
    relation: "categorizes new expenses"
    protocol: "Module call"
    data: ["description", "category rules", "assigned category"]
    source_refs: [".vivicy/canonical/03-category-rules.md:11"]

  - from: cli
    to: reporter
    relation: "requests monthly report"
    protocol: "Module call"
    data: ["month", "monthly total", "category breakdown"]
    source_refs: [".vivicy/canonical/04-reporting.md:11"]

  - from: cli
    to: exporter
    relation: "requests CSV export"
    protocol: "Module call"
    data: ["expenses", "CSV text"]
    source_refs: [".vivicy/canonical/05-csv-export.md:11"]

  - from: reporter
    to: ledger
    relation: "reads stored expenses"
    protocol: "Module call"
    data: ["expense records"]
    source_refs: [".vivicy/canonical/04-reporting.md:7"]

  - from: exporter
    to: ledger
    relation: "reads stored expenses"
    protocol: "Module call"
    data: ["expense records"]
    source_refs: [".vivicy/canonical/05-csv-export.md:7"]
