# Build the Vivicy desktop app (Tauri v2) for macOS and Windows.
#
# Vivicy's UI needs a live Node/Next server at runtime (its API routes spawn the
# agent CLIs, browse the FS, stream status), so the desktop app runs that Next
# standalone server as a Tauri SIDECAR on localhost. `src-tauri/scripts/
# prepare-sidecar.mjs` (invoked by Tauri's beforeBuildCommand) builds the
# standalone server, stages it as a resource, and downloads an official
# self-contained Node binary named `node-<target-triple>` as the externalBin.
#
# This workflow proves the cross-platform story the local macOS build cannot:
# it builds BOTH bundles on a version tag (.dmg/.app on macOS, .exe/.msi on
# Windows) and uploads them as release artifacts. The macOS leg mirrors exactly
# what is built locally; the Windows leg is the real, CI-produced .exe.
name: desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple silicon. Add `macos-13` for an Intel x86_64 leg if needed.
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS dependencies
        run: npm ci

      # tauri-action runs `prepare-sidecar.mjs` via the conf's beforeBuildCommand,
      # which stages the standalone server and the official Node sidecar for the
      # matrix target (VIVICY_TARGET_TRIPLE makes the binary name match --target).
      - name: Build desktop bundles
        uses: tauri-apps/tauri-action@v0
        env:
          VIVICY_TARGET_TRIPLE: ${{ matrix.target }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Vivicy ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vivicy-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.msi
          if-no-files-found: ignore
