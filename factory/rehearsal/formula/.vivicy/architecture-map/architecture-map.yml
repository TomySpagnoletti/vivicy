  source_ref_grammar: "path[:line][#anchor]"

kind_taxonomy:
  - actor
  - service
  - store
  - library

kind_definitions:
  - "actor: external caller that originates a formula evaluation request"
  - "service: stateless module that transforms its input into an output"
  - "store: module that owns persistent in-memory spreadsheet state"
  - "library: collection of pure callable units registered for dispatch"

flow_classes:
  - "formula string to evaluated value"
  - "cell mutation to recalculated dependents"

high_risk_kinds:
  - store

rules:
  - "Edit architecture-map.yml only. Generated viewer data is a build artifact."
  - "The Sheet is the single source of truth for stored cell values; no other module mutates them directly."
  - "The API is the only public entry point and the only module a caller imports."
  - "The Tokenizer, Parser, Evaluator, and function families hold no spreadsheet state."

status_legend:
  not_started: "Documented target; implementation not started."
  in_progress: "Implementation underway on this slice."
  reviewing: "Implemented and under independent review."
  implemented: "Implemented; verification gates not yet all green."
  verified: "Implemented and passed all required verification gates."
  blocked: "Blocked on an unmet dependency or open question."

